# ── Factory ──────────────────────────────────────────
type Factory @entity {
  id: ID! # factory address
  poolCount: BigInt!
  txCount: BigInt!
  totalVolumeUSD: BigDecimal!
  totalVolumeETH: BigDecimal!
  totalFeesUSD: BigDecimal!
  totalFeesETH: BigDecimal!
  totalValueLockedUSD: BigDecimal!
  totalValueLockedETH: BigDecimal!
  owner: ID!
}

# ── Token ────────────────────────────────────────────
type Token @entity {
  id: ID! # token address
  symbol: String!
  name: String!
  decimals: BigInt!
  totalSupply: BigInt!
  volume: BigDecimal!
  volumeUSD: BigDecimal!
  untrackedVolumeUSD: BigDecimal!
  feesUSD: BigDecimal!
  txCount: BigInt!
  poolCount: BigInt!
  totalValueLocked: BigDecimal!
  totalValueLockedUSD: BigDecimal!
  totalValueLockedUSDUntracked: BigDecimal!
  derivedETH: BigDecimal!
  whitelistPools: [Pool!]!
}

# ── Pool ─────────────────────────────────────────────
type Pool @entity {
  id: ID! # pool address
  createdAtTimestamp: BigInt!
  createdAtBlockNumber: BigInt!
  token0: Token!
  token1: Token!
  feeTier: BigInt!
  liquidity: BigInt!
  sqrtPrice: BigInt!
  tick: BigInt
  observationIndex: BigInt!
  token0Price: BigDecimal!
  token1Price: BigDecimal!
  volumeToken0: BigDecimal!
  volumeToken1: BigDecimal!
  volumeUSD: BigDecimal!
  untrackedVolumeUSD: BigDecimal!
  feesUSD: BigDecimal!
  txCount: BigInt!
  collectedFeesToken0: BigDecimal!
  collectedFeesToken1: BigDecimal!
  collectedFeesUSD: BigDecimal!
  totalValueLockedToken0: BigDecimal!
  totalValueLockedToken1: BigDecimal!
  totalValueLockedETH: BigDecimal!
  totalValueLockedUSD: BigDecimal!
  totalValueLockedUSDUntracked: BigDecimal!
  liquidityProviderCount: BigInt!
  # Sentry launchpad attribution — set true when the pool was seeded
  # by SentryLaunchFactory. sentryCreator is the EOA that called launch()
  # (or the @sentrylauncher sponsor wallet for tweet-launched tokens).
  isSentry: Boolean!
  sentryCreator: Bytes
  sentryTokenId: BigInt
  sentryToken: Token
  # Snapshots
  poolHourData: [PoolHourData!]! @derivedFrom(field: "pool")
  poolDayData: [PoolDayData!]! @derivedFrom(field: "pool")
  # Events
  mints: [Mint!]! @derivedFrom(field: "pool")
  burns: [Burn!]! @derivedFrom(field: "pool")
  swaps: [Swap!]! @derivedFrom(field: "pool")
  collects: [Collect!]! @derivedFrom(field: "pool")
  ticks: [Tick!]! @derivedFrom(field: "pool")
}

# ── Tick ─────────────────────────────────────────────
type Tick @entity {
  id: ID! # pool address + "#" + tick index
  poolAddress: String
  tickIdx: BigInt!
  pool: Pool!
  liquidityGross: BigInt!
  liquidityNet: BigInt!
  price0: BigDecimal!
  price1: BigDecimal!
  createdAtTimestamp: BigInt!
  createdAtBlockNumber: BigInt!
}

# ── Position (NFT LP) ───────────────────────────────
type Position @entity {
  id: ID! # NFT token ID
  owner: Bytes!
  pool: Pool!
  token0: Token!
  token1: Token!
  tickLower: Tick!
  tickUpper: Tick!
  liquidity: BigInt!
  depositedToken0: BigDecimal!
  depositedToken1: BigDecimal!
  withdrawnToken0: BigDecimal!
  withdrawnToken1: BigDecimal!
  collectedFeesToken0: BigDecimal!
  collectedFeesToken1: BigDecimal!
  feeGrowthInside0LastX128: BigInt!
  feeGrowthInside1LastX128: BigInt!
  transaction: Transaction!
}

# ── Transaction ──────────────────────────────────────
type Transaction @entity {
  id: ID! # txn hash
  blockNumber: BigInt!
  timestamp: BigInt!
  gasUsed: BigInt!
  gasPrice: BigInt!
  mints: [Mint]! @derivedFrom(field: "transaction")
  burns: [Burn]! @derivedFrom(field: "transaction")
  swaps: [Swap]! @derivedFrom(field: "transaction")
  collects: [Collect]! @derivedFrom(field: "transaction")
}

# ── Swap ─────────────────────────────────────────────
type Swap @entity {
  id: ID! # txn hash + "#" + index
  transaction: Transaction!
  timestamp: BigInt!
  pool: Pool!
  token0: Token!
  token1: Token!
  sender: Bytes!
  recipient: Bytes!
  origin: Bytes! # the EOA that initiated the txn
  amount0: BigDecimal!
  amount1: BigDecimal!
  amountUSD: BigDecimal!
  sqrtPriceX96: BigInt!
  tick: BigInt!
  logIndex: BigInt
}

# ── Mint (Add Liquidity) ────────────────────────────
type Mint @entity {
  id: ID!
  transaction: Transaction!
  timestamp: BigInt!
  pool: Pool!
  token0: Token!
  token1: Token!
  owner: Bytes!
  sender: Bytes
  origin: Bytes! # the EOA
  amount: BigInt!
  amount0: BigDecimal!
  amount1: BigDecimal!
  amountUSD: BigDecimal
  tickLower: BigInt!
  tickUpper: BigInt!
  logIndex: BigInt
}

# ── Burn (Remove Liquidity) ─────────────────────────
type Burn @entity {
  id: ID!
  transaction: Transaction!
  timestamp: BigInt!
  pool: Pool!
  token0: Token!
  token1: Token!
  owner: Bytes
  origin: Bytes! # the EOA
  amount: BigInt!
  amount0: BigDecimal!
  amount1: BigDecimal!
  amountUSD: BigDecimal
  tickLower: BigInt!
  tickUpper: BigInt!
  logIndex: BigInt
}

# ── Collect (Fee Collection) ────────────────────────
type Collect @entity {
  id: ID!
  transaction: Transaction!
  timestamp: BigInt!
  pool: Pool!
  owner: Bytes
  amount0: BigDecimal!
  amount1: BigDecimal!
  amountUSD: BigDecimal
  tickLower: BigInt!
  tickUpper: BigInt!
  logIndex: BigInt
}

# ── Time-series Snapshots ───────────────────────────
type TsunamiDayData @entity {
  id: ID! # timestamp / 86400
  date: Int!
  volumeETH: BigDecimal!
  volumeUSD: BigDecimal!
  volumeUSDUntracked: BigDecimal!
  feesUSD: BigDecimal!
  txCount: BigInt!
  tvlUSD: BigDecimal!
}

type PoolDayData @entity {
  id: ID! # pool address + "-" + day
  date: Int!
  pool: Pool!
  liquidity: BigInt!
  sqrtPrice: BigInt!
  token0Price: BigDecimal!
  token1Price: BigDecimal!
  tick: BigInt
  tvlUSD: BigDecimal!
  volumeToken0: BigDecimal!
  volumeToken1: BigDecimal!
  volumeUSD: BigDecimal!
  feesUSD: BigDecimal!
  txCount: BigInt!
  open: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  close: BigDecimal!
}

type PoolHourData @entity {
  id: ID! # pool address + "-" + hour
  periodStartUnix: Int!
  pool: Pool!
  liquidity: BigInt!
  sqrtPrice: BigInt!
  token0Price: BigDecimal!
  token1Price: BigDecimal!
  tick: BigInt
  tvlUSD: BigDecimal!
  volumeToken0: BigDecimal!
  volumeToken1: BigDecimal!
  volumeUSD: BigDecimal!
  feesUSD: BigDecimal!
  txCount: BigInt!
  open: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  close: BigDecimal!
}

type TokenDayData @entity {
  id: ID! # token address + "-" + day
  date: Int!
  token: Token!
  volume: BigDecimal!
  volumeUSD: BigDecimal!
  untrackedVolumeUSD: BigDecimal!
  totalValueLocked: BigDecimal!
  totalValueLockedUSD: BigDecimal!
  priceUSD: BigDecimal!
  feesUSD: BigDecimal!
  open: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  close: BigDecimal!
}

type TokenHourData @entity {
  id: ID! # token address + "-" + hour
  periodStartUnix: Int!
  token: Token!
  volume: BigDecimal!
  volumeUSD: BigDecimal!
  untrackedVolumeUSD: BigDecimal!
  totalValueLocked: BigDecimal!
  totalValueLockedUSD: BigDecimal!
  priceUSD: BigDecimal!
  feesUSD: BigDecimal!
  open: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  close: BigDecimal!
}

type Bundle @entity {
  id: ID! # "1"
  ethPriceUSD: BigDecimal!
}

# ── User (per-EOA aggregates) ────────────────────────
# One entity per EOA that has ever swapped on Tsunami. Updated on every
# Swap event (from Pool.handleSwap) and every CreatorFeePaid event (from
# SentryLaunchFactory.handleSentryCreatorFeePaid).
type User @entity {
  id: ID! # EOA address (lowercased)
  # Total swap count on all Tsunami pools.
  swapCount: BigInt!
  # Subset of swapCount where pool.isSentry == true.
  swapCountOnSentryPools: BigInt!
  # Cumulative swap volume across ALL Tsunami pools (USD).
  volumeUSD: BigDecimal!
  # Cumulative swap volume on Sentry-launched pools only (USD).
  volumeUSDOnSentryPools: BigDecimal!
  # Total LP fees this EOA's swaps generated for the Sentry ecosystem (USD).
  # Computed at swap time as volumeUSDOnSentryPools * 0.01 (1% fee tier).
  feesGeneratedUSD: BigDecimal!
  # Cumulative WETH-denominated creator fees received for tokens this
  # EOA launched. Raw wei (BigInt) and USD-converted at receipt time.
  creatorFeesEarnedWei: BigInt!
  creatorFeesEarnedUSD: BigDecimal!
  firstSwapTimestamp: BigInt!
  lastSwapTimestamp: BigInt!
}

# ── CreatorFeePayment (per-event log) ────────────────
# One entity per CreatorFeePaid event for a creator-earnings tx history view.
# Aggregates roll up into User.creatorFeesEarnedWei/USD.
type CreatorFeePayment @entity {
  id: ID! # txHash + "-" + logIndex
  tokenId: BigInt!
  creator: Bytes!
  wethAmount: BigInt!
  amountUSD: BigDecimal!
  timestamp: BigInt!
  blockNumber: BigInt!
  transaction: Transaction!
}
