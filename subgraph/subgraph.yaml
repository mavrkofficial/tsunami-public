specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  # ── TsunamiV3Factory ───────────────────────────────
  - kind: ethereum
    name: Factory
    network: ink
    source:
      address: "0xD8B0826150B7686D1F56d6F10E31E58e1BCF1193"
      abi: Factory
      startBlock: 39943040
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Factory
        - Pool
        - Token
      abis:
        - name: Factory
          file: ./abis/Factory.json
        - name: ERC20
          file: ./abis/ERC20.json
        - name: ERC20SymbolBytes
          file: ./abis/ERC20SymbolBytes.json
        - name: ERC20NameBytes
          file: ./abis/ERC20NameBytes.json
        - name: Pool
          file: ./abis/Pool.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,indexed uint24,int24,address)
          handler: handlePoolCreated
      file: ./src/mappings/factory.ts

  # ── SentryLaunchFactory V4 (current proxy) ─────────
  - kind: ethereum
    name: SentryLaunchFactory
    network: ink
    source:
      address: "0xDc37e11B68052d1539fa23386eE58Ac444bf5BE1"
      abi: SentryLaunchFactory
      startBlock: 42008767
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Token
        - User
        - CreatorFeePayment
      abis:
        - name: SentryLaunchFactory
          file: ./abis/SentryLaunchFactory.json
      eventHandlers:
        - event: PoolInitialized(indexed address,indexed address)
          handler: handleSentryPoolInitialized
        - event: TokenDeployed(indexed address,string,string,indexed address,uint256)
          handler: handleSentryTokenDeployed
        - event: CreatorFeePaid(indexed uint256,indexed address,uint256)
          handler: handleSentryCreatorFeePaid
      file: ./src/mappings/sentry-factory.ts

  # ── Legacy SentryAgentLaunchFactory (proxy) ────────
  # Original agent factory — proxy at 0x733733E8…E2E4. Emits the same
  # PoolInitialized + TokenDeployed signatures as V4, so we reuse the
  # SentryLaunchFactory ABI and the sentry-factory.ts handlers. The legacy
  # factory does NOT emit CreatorFeePaid (that's V4-only), so we register
  # only the two handlers it actually fires.
  - kind: ethereum
    name: SentryAgentLaunchFactoryLegacy
    network: ink
    source:
      address: "0x733733E8eAbB94832847AbF0E0EeD6031c3EB2E4"
      abi: SentryLaunchFactory
      startBlock: 40126112
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Token
        - User
      abis:
        - name: SentryLaunchFactory
          file: ./abis/SentryLaunchFactory.json
      eventHandlers:
        - event: PoolInitialized(indexed address,indexed address)
          handler: handleSentryPoolInitialized
        - event: TokenDeployed(indexed address,string,string,indexed address,uint256)
          handler: handleSentryTokenDeployed
      file: ./src/mappings/sentry-factory.ts

  # ── NonfungiblePositionManager ─────────────────────
  - kind: ethereum
    name: NonfungiblePositionManager
    network: ink
    source:
      address: "0x98b6267DA27c5A21Bd6e3edfBC2DA6b0428Fa9F7"
      abi: NonfungiblePositionManager
      startBlock: 39943040
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Position
        - PositionSnapshot
        - Token
      abis:
        - name: NonfungiblePositionManager
          file: ./abis/NonfungiblePositionManager.json
        - name: Pool
          file: ./abis/Pool.json
        - name: Factory
          file: ./abis/Factory.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: IncreaseLiquidity(indexed uint256,uint128,uint256,uint256)
          handler: handleIncreaseLiquidity
        - event: DecreaseLiquidity(indexed uint256,uint128,uint256,uint256)
          handler: handleDecreaseLiquidity
        - event: Collect(indexed uint256,address,uint256,uint256)
          handler: handleCollect
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/mappings/position-manager.ts

# ── Dynamic Pool Template ──────────────────────────
templates:
  - kind: ethereum
    name: Pool
    network: ink
    source:
      abi: Pool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Token
        - Tick
        - Swap
        - Mint
        - Burn
      abis:
        - name: Pool
          file: ./abis/Pool.json
        - name: Factory
          file: ./abis/Factory.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Initialize(uint160,int24)
          handler: handleInitialize
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleSwap
        - event: Mint(address,indexed address,indexed int24,indexed int24,uint128,uint256,uint256)
          handler: handleMint
        - event: Burn(indexed address,indexed int24,indexed int24,uint128,uint256,uint256)
          handler: handleBurn
        - event: Collect(indexed address,address,indexed int24,indexed int24,uint128,uint128)
          handler: handlePoolCollect
      file: ./src/mappings/pool.ts
