[profile.default]
src = "contracts"
test = "test"
script = "script"
out = "out"
libs = ["lib", "src", "@openzeppelin", "@uniswap", "base64-sol", "node_modules"]
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
remappings = [
  "@uniswap/v3-core/=src/pkgs/v3-core/",
  "@uniswap/v3-periphery/=src/pkgs/v3-periphery/",
  "@uniswap/v2-core/=src/pkgs/v2-core/",
  "@uniswap/swap-router-contracts/=src/pkgs/swap-router-contracts/",
  "@uniswap/lib/=@uniswap/lib/",
  "@openzeppelin/=@openzeppelin/",
  "base64-sol/=base64-sol/",
  "solmate/=lib/solmate/",
  "forge-std/=lib/forge-std/src/",
  "permit2/=lib/permit2/"
]

# ── Ink Mainnet (chain ID 57073) ─────────────────────────────
[rpc_endpoints]
ink = "${INK_RPC_URL}"
ink_mainnet = "https://rpc-gel.inkonchain.com"

[etherscan]
ink = { key = "any", url = "https://explorer.inkonchain.com/api/", chain = 57073 }

[profile.governance]
src = "contracts"
test = "test/governance"
script = "script/governance"
out = "out-governance"
libs = ["lib", "src", "@openzeppelin", "@uniswap", "base64-sol", "node_modules"]
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
